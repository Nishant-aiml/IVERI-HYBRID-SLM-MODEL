# IVERI Nano (10M Parameters) Preset Configuration
model:
  hidden_dim: 256
  num_layers: 4
  num_heads: 4
  mamba_ratio: 1
  num_experts: 2
  num_active_experts: 1
  titans_memory_dim: 64
  max_recursion_depth: 4
  dropout: 0.0
  use_titans: true
  use_blt: true
  use_mor: true
  use_moe: true
  use_entropy_routing: true
  moe_capacity_factor: 1.25

training:
  batch_size: 32
  gradient_accumulation: 4
  learning_rate: 0.0003
  min_lr: 0.00003
  warmup_steps: 1000
  max_steps: 50000
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 512
  scheduler_type: cosine
